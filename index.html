<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ELITE</title>

<style>
body { margin:0; font-family:-apple-system; background:#000; color:white; }
.screen { display:none; }
.active { display:block; }

/* SPLASH */
#splash {
  position:fixed;
  width:100%; height:100%;
  background:black;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:34px;
  font-weight:800;
  letter-spacing:2px;
}

/* HERO */
.hero {
  height:230px;
  background-size:cover;
  background-position:center;
  display:flex;
  align-items:flex-end;
}
.overlay {
  width:100%;
  padding:20px;
  background:linear-gradient(180deg,transparent,rgba(0,0,0,0.9));
  font-size:28px;
  font-weight:700;
}

/* UI */
.btn {
  background:#00ffcc;
  color:black;
  padding:14px;
  border-radius:12px;
  margin:15px;
  text-align:center;
}
.card {
  background:#121212;
  margin:12px;
  padding:16px;
  border-radius:16px;
}
.set {
  background:#1c1c1c;
  padding:14px;
  margin-top:10px;
  border-radius:12px;
}

/* FOCUS */
#focus {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background-size:cover;
  background-position:center;
  display:none;
  text-align:center;
  padding-top:25%;
}
.focus-overlay {
  position:absolute;
  width:100%; height:100%;
  background:linear-gradient(180deg,rgba(0,0,0,0.3),black);
}
.focus-content { position:relative; z-index:2; }
.big { font-size:64px; font-weight:800; }

/* TIMER */
svg { transform:rotate(-90deg); }
circle {
  fill:none;
  stroke:#00ffcc;
  stroke-width:8;
  stroke-dasharray:314;
  stroke-dashoffset:0;
  transition:1s linear;
}
</style>
</head>

<body>

<div id="splash">NIKE ELITE</div>

<!-- HOME -->
<div id="home" class="screen">
  <div id="homeHero" class="hero"></div>
  <div class="card">
    Day <span id="day"></span>
    <div class="btn" onclick="goWorkout()">Start Workout</div>
  </div>
</div>

<!-- WORKOUT -->
<div id="workout" class="screen">
  <div style="padding:15px; display:flex; justify-content:space-between;">
    <div onclick="goHome()">←</div>
    <div>NIKE ELITE</div>
    <div></div>
  </div>

  <div id="workHero" class="hero"></div>

  <div style="display:flex; justify-content:space-between; padding:10px;">
    <div onclick="prevDay()">◀ Prev</div>
    <div onclick="nextDay()">Next ▶</div>
  </div>

  <div id="list"></div>
</div>

<!-- FOCUS -->
<div id="focus">
  <div class="focus-overlay"></div>

  <div class="focus-content">
    <div id="f-ex"></div>
    <div id="f-set"></div>
    <div class="big" id="f-w"></div>
    <div id="f-r"></div>
    <div id="timerText"></div>

    <svg width="120" height="120">
      <circle r="50" cx="60" cy="60" id="circle"></circle>
    </svg>

    <div class="btn" onclick="completeSet()">Done</div>
    <div class="btn" onclick="exitFocus()">Exit</div>
  </div>
</div>

<script>
let day = parseInt(localStorage.getItem("day")) || 1;
let data = JSON.parse(localStorage.getItem("data")) || [];
const days = ["Upper","Lower","Push","Pull","Legs"];

/* DYNAMIC IMAGES */
const images = {
  home:[
    "https://images.unsplash.com/photo-1558611848-73f7eb4001a1",
    "https://images.unsplash.com/photo-1599058917212-d750089bc07e"
  ],
  Push:"https://images.unsplash.com/photo-1599058917212-d750089bc07e",
  Pull:"https://images.unsplash.com/photo-1594737625785-a6cbdabd333c",
  Legs:"https://images.unsplash.com/photo-1571019613454-1cb2f99b2d8b",
  Upper:"https://images.unsplash.com/photo-1558611848-73f7eb4001a1",
  Lower:"https://images.unsplash.com/photo-1579758629938-03607ccdbaba",

  chest:"https://images.unsplash.com/photo-1583454110551-21f2fa2afe61",
  back:"https://images.unsplash.com/photo-1605296867304-46d5465a13f1",
  legs:"https://images.unsplash.com/photo-1571019613454-1cb2f99b2d8b",
  arms:"https://images.unsplash.com/photo-1583454110551-21f2fa2afe61"
};

/* SPLASH */
setTimeout(()=>{
  document.getElementById("splash").style.display="none";
  show("home");
  initHome();
},1500);

function show(s){
  document.querySelectorAll(".screen").forEach(e=>e.classList.remove("active"));
  document.getElementById(s).classList.add("active");
}

function goHome(){
  show("home");
}

function initHome(){
  document.getElementById("day").innerText = day;
  rotateHome();
}

function rotateHome(){
  let i=0;
  setInterval(()=>{
    document.getElementById("homeHero").style.backgroundImage =
      `url(${images.home[i%images.home.length]})`;
    i++;
  },3000);
}

function nextDay(){ if(day<100){day++; localStorage.setItem("day",day); renderWorkout();}}
function prevDay(){ if(day>1){day--; localStorage.setItem("day",day); renderWorkout();}}

function goWorkout(){
  show("workout");
  renderWorkout();
}

/* PROGRESSION */
function week(){ return Math.floor((day-1)/5); }
function prog(){ return week()*2.5; }

/* FULL PLAN */
function build(type){
  let p = prog();

  if(type==="Upper"){
    return [
      {name:"Bench Press",sets:[{w:15,r:10},{w:20,r:5},{w:30+p,r:8},{w:30+p,r:6},{w:30+p,r:5}]},
      {name:"Barbell Row",sets:[{w:40+p,r:8},{w:40+p,r:8},{w:40+p,r:8},{w:40+p,r:8}]},
      {name:"Overhead Press",sets:[{w:30+p,r:6},{w:30+p,r:6},{w:30+p,r:6}]},
      {name:"Bicep Curl",sets:[{w:10,r:12},{w:10,r:12},{w:10,r:12}]}
    ];
  }
  if(type==="Lower"){
    return [
      {name:"Squat",sets:[{w:30,r:10},{w:40,r:5},{w:60+p,r:8},{w:60+p,r:6},{w:60+p,r:5}]},
      {name:"RDL",sets:[{w:50+p,r:8},{w:50+p,r:8},{w:50+p,r:8}]},
      {name:"Leg Curl",sets:[{w:30,r:12},{w:30,r:12},{w:30,r:12}]}
    ];
  }
  if(type==="Push"){
    return [
      {name:"Incline DB Press",sets:[{w:25+p,r:10},{w:25+p,r:10},{w:25+p,r:10},{w:25+p,r:10}]},
      {name:"Shoulder Press",sets:[{w:30+p,r:10},{w:30+p,r:10},{w:30+p,r:10}]},
      {name:"Lateral Raise",sets:[{w:8,r:15},{w:8,r:15},{w:8,r:15}]},
      {name:"Tricep Pushdown",sets:[{w:25,r:12},{w:25,r:12},{w:25,r:12}]}
    ];
  }
  if(type==="Pull"){
    return [
      {name:"Lat Pulldown",sets:[{w:50+p,r:10},{w:50+p,r:10},{w:50+p,r:10},{w:50+p,r:10}]},
      {name:"Seated Row",sets:[{w:40+p,r:10},{w:40+p,r:10},{w:40+p,r:10}]},
      {name:"Face Pull",sets:[{w:20,r:15},{w:20,r:15},{w:20,r:15}]},
      {name:"Bicep Curl",sets:[{w:10,r:12},{w:10,r:12},{w:10,r:12}]}
    ];
  }
  if(type==="Legs"){
    return [
      {name:"Leg Press",sets:[{w:100+p,r:12},{w:100+p,r:12},{w:100+p,r:12},{w:100+p,r:12}]},
      {name:"Walking Lunges",sets:[{w:20,r:12},{w:20,r:12},{w:20,r:12}]},
      {name:"RDL",sets:[{w:50+p,r:10},{w:50+p,r:10},{w:50+p,r:10}]}
    ];
  }
}

/* WORKOUT RENDER */
function renderWorkout(){
  let type = days[(day-1)%5];
  document.getElementById("workHero").style.backgroundImage = `url(${images[type]})`;
  document.getElementById("workHero").innerHTML = `<div class="overlay">${type} Day</div>`;

  let plan = build(type);
  let html="";

  plan.forEach(ex=>{
    html+=`<div class="card"><b>${ex.name}</b>`;
    ex.sets.forEach((s,i)=>{
      html+=`<div class="set" onclick="openFocus('${ex.name}',${i},${s.w},${s.r},${ex.sets.length})">
      ${s.w}kg × ${s.r}</div>`;
    });
    html+="</div>";
  });

  document.getElementById("list").innerHTML = html;
}

/* FOCUS */
let current;
let timer;
let totalTime = 60;

function getExerciseImage(name){
  if(name.includes("Press")) return images.chest;
  if(name.includes("Row") || name.includes("Pull")) return images.back;
  if(name.includes("Squat") || name.includes("Leg")) return images.legs;
  return images.arms;
}

function openFocus(ex,set,w,r,total){
  current={ex,set,w,r,total};

  document.getElementById("focus").style.display="block";
  document.getElementById("focus").style.backgroundImage = `url(${getExerciseImage(ex)})`;

  document.getElementById("f-ex").innerText=ex;
  document.getElementById("f-set").innerText=`Set ${set+1}/${total}`;
  document.getElementById("f-w").innerText=w+"kg";
  document.getElementById("f-r").innerText=r+" reps";
}

/* NEXT SET */
function getNextSet(){
  let type = days[(day-1)%5];
  let plan = build(type);

  for(let i=0;i<plan.length;i++){
    for(let j=0;j<plan[i].sets.length;j++){
      if(plan[i].name===current.ex && j===current.set){
        if(j+1 < plan[i].sets.length){
          return {ex:plan[i].name,set:j+1,w:plan[i].sets[j+1].w,r:plan[i].sets[j+1].r,total:plan[i].sets.length};
        } else if(i+1 < plan.length){
          return {ex:plan[i+1].name,set:0,w:plan[i+1].sets[0].w,r:plan[i+1].sets[0].r,total:plan[i+1].sets.length};
        }
      }
    }
  }
  return null;
}

/* TIMER */
function completeSet(){
  data.push({...current,day});
  localStorage.setItem("data", JSON.stringify(data));
  startTimer(totalTime);
}

function startTimer(t){
  clearInterval(timer);
  let circle=document.getElementById("circle");
  let next = getNextSet();

  if(next){
    document.getElementById("f-set").innerText =
      `Next: ${next.ex} | Set ${next.set+1}/${next.total}`;
  }

  timer=setInterval(()=>{
    document.getElementById("timerText").innerText = t + "s";

    let offset = 314 - (314 * t / totalTime);
    circle.style.strokeDashoffset = offset;

    t--;

    if(t<0){
      clearInterval(timer);

      if(next){
        openFocus(next.ex,next.set,next.w,next.r,next.total);
      } else {
        exitFocus();
        renderWorkout();
      }
    }
  },1000);
}

function exitFocus(){
  clearInterval(timer);
  document.getElementById("focus").style.display="none";
}
</script>

</body>
</html>
