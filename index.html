<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ELITE</title>

<style>
body {
  margin:0;
  font-family:-apple-system;
  color:white;
  background:#000;
}

.screen { display:none; }
.active { display:block; }

.hero {
  height:220px;
  background-size:cover;
  background-position:center;
  display:flex;
  align-items:flex-end;
  padding:20px;
  font-size:28px;
  font-weight:700;
}

.overlay {
  background:linear-gradient(180deg,transparent,black);
  width:100%;
  padding:10px;
}

.btn {
  background:#00ffcc;
  color:black;
  padding:14px;
  border-radius:12px;
  margin:15px;
  text-align:center;
}

.card {
  background:#121212;
  margin:12px;
  padding:16px;
  border-radius:16px;
}

.set {
  background:#1c1c1c;
  padding:14px;
  margin-top:10px;
  border-radius:12px;
}

/* FOCUS */
#focus {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background-size:cover;
  background-position:center;
  display:none;
  text-align:center;
  padding-top:30%;
}

.big { font-size:64px; font-weight:800; }

.circle {
  width:120px;
  height:120px;
  border-radius:50%;
  border:6px solid #00ffcc;
  margin:20px auto;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:24px;
}
</style>
</head>

<body>

<!-- HOME -->
<div id="home" class="screen active">
  <div class="hero" style="background-image:url('https://images.unsplash.com/photo-1558611848-73f7eb4001a1')">
    <div class="overlay">ELITE TRAINING</div>
  </div>

  <div class="card">
    Day <span id="day"></span>
    <div class="btn" onclick="goWorkout()">Start Workout</div>
  </div>
</div>

<!-- WORKOUT -->
<div id="workout" class="screen">
  <div id="hero2" class="hero"></div>
  <div id="list"></div>
</div>

<!-- FOCUS -->
<div id="focus">
  <div id="f-ex"></div>
  <div id="f-set"></div>
  <div class="big" id="f-w"></div>
  <div id="f-r"></div>

  <div class="circle" id="timerCircle">60</div>

  <div class="btn" onclick="completeSet()">Done</div>
  <div class="btn" onclick="exitFocus()">Exit</div>
</div>

<script>
let day = parseInt(localStorage.getItem("day")) || 1;
let data = JSON.parse(localStorage.getItem("data")) || [];

const days = ["Upper","Lower","Push","Pull","Legs"];

function show(s){
  document.querySelectorAll(".screen").forEach(e=>e.classList.remove("active"));
  document.getElementById(s).classList.add("active");
}

function goWorkout(){
  show("workout");
  renderWorkout();
}

function week(){ return Math.floor((day-1)/5); }
function prog(){ return week()*2.5; }

function build(type){
  let p = prog();
  return [
    {name:"Bench Press",sets:[
      {w:15,r:10},{w:20,r:5},{w:30+p,r:8},{w:30+p,r:6}
    ]}
  ];
}

function getImage(type){
  if(type==="Push") return "https://images.unsplash.com/photo-1599058917212-d750089bc07e";
  if(type==="Pull") return "https://images.unsplash.com/photo-1594737625785-a6cbdabd333c";
  if(type==="Legs") return "https://images.unsplash.com/photo-1571019613454-1cb2f99b2d8b";
  return "https://images.unsplash.com/photo-1558611848-73f7eb4001a1";
}

function renderWorkout(){
  let type = days[(day-1)%5];

  document.getElementById("hero2").style.backgroundImage =
    `url(${getImage(type)})`;
  document.getElementById("hero2").innerHTML =
    `<div class="overlay">${type} Day</div>`;

  let plan = build(type);
  let html="";

  plan.forEach(ex=>{
    html+=`<div class="card">${ex.name}`;
    ex.sets.forEach((s,i)=>{
      html+=`<div class="set" onclick="openFocus('${ex.name}',${i},${s.w},${s.r},${ex.sets.length})">
      ${s.w}kg × ${s.r}</div>`;
    });
    html+="</div>";
  });

  document.getElementById("list").innerHTML = html;
}

let current;
let timer;

function openFocus(ex,set,w,r,total){
  current={ex,set,w,r,total};

  document.getElementById("focus").style.display="block";
  document.getElementById("focus").style.backgroundImage =
    `url(${getImage(days[(day-1)%5])})`;

  document.getElementById("f-ex").innerText=ex;
  document.getElementById("f-set").innerText=`Set ${set+1} / ${total}`;
  document.getElementById("f-w").innerText=w+"kg";
  document.getElementById("f-r").innerText=r+" reps";
}

function completeSet(){
  data.push({...current,day});
  localStorage.setItem("data", JSON.stringify(data));
  startTimer(60);
}

function startTimer(t){
  clearInterval(timer);
  let el=document.getElementById("timerCircle");

  timer=setInterval(()=>{
    el.innerText=t;
    t--;

    if(t<0){
      clearInterval(timer);
      exitFocus();
      renderWorkout();
    }
  },1000);
}

function exitFocus(){
  clearInterval(timer);
  document.getElementById("focus").style.display="none";
}

document.getElementById("day").innerText = day;
</script>

</body>
</html>
